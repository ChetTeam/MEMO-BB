        async function init() {
            db = await window.api.getData();
            renderMiniForum();
            switchView('menu');
            renderFilterBar();
            updateFuse();
            search();
        }

        function switchView(viewName) {
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('view-general').classList.add('hidden');
            document.getElementById('view-mini').classList.add('hidden');
            
            document.getElementById(`view-${viewName}`).classList.remove('hidden');

            const btnBack = document.getElementById('btn-back');
            const footer = document.getElementById('footer-opacity');

            if (viewName === 'menu') {
                btnBack.classList.add('hidden');
                footer.classList.add('hidden');
            } else {
                btnBack.classList.remove('hidden');
                footer.classList.remove('hidden');
                if (viewName === 'general') document.getElementById('search').focus();
            }
        }

        function switchMainTab(tab) {
            currentMainTab = tab;
            currentFilter = 'ALL';
            
            const btnLaws = document.getElementById('tab-laws');
            const btnRules = document.getElementById('tab-rules');

            if (tab === 'rules') {
                btnRules.className = "flex-1 py-2 rounded bg-[#ff1e56] text-white font-black transition-all uppercase tracking-wider shadow-[0_0_15px_rgba(255,30,86,0.15)]";
                btnLaws.className = "flex-1 py-2 rounded bg-[#16161f] text-zinc-400 font-bold uppercase tracking-wider hover:bg-[#1e1e2a]";
            } else {
                btnLaws.className = "flex-1 py-2 rounded bg-[#ff1e56] text-white font-black transition-all uppercase tracking-wider shadow-[0_0_15px_rgba(255,30,86,0.15)]";
                btnRules.className = "flex-1 py-2 rounded bg-[#16161f] text-zinc-400 font-bold uppercase tracking-wider hover:bg-[#1e1e2a]";
            }

            renderFilterBar();
            updateFuse();
            search();
        }

        function renderFilterBar() {
            const container = document.getElementById('filter-bar');
            container.innerHTML = filtersStructure[currentMainTab].map(f => {
                const isSelected = f === currentFilter || (currentFilter === 'ALL' && f === 'ALL');
                const btnClass = isSelected 
                    ? "filter-btn px-3 py-1.5 rounded bg-[#181824] text-[#ff1e56] border border-[#ff1e56]/30 font-bold" 
                    : "filter-btn px-3 py-1.5 rounded bg-[#111116] text-zinc-500 border border-transparent hover:bg-[#161622] transition-all";
                return `<button onclick="setFilter('${f}')" class="${btnClass}">${f === 'ALL' ? 'ВСЕ' : f}</button>`;
            }).join('');
        }

        function setFilter(filter) {
            currentFilter = filter;
            renderFilterBar();
            updateFuse();
            search();
        }

        function updateFuse() {
            let data = db[currentMainTab] || [];
            if (currentFilter !== 'ALL') data = data.filter(item => item.category === currentFilter);
            fuse = new Fuse(data, { keys: ['title', 'fullText'], threshold: 0.35, ignoreLocation: true });
        }

        function search() {
            const query = document.getElementById('search').value.trim().toLowerCase();
            let source = db[currentMainTab] || [];
            if (currentFilter !== 'ALL') source = source.filter(item => item.category === currentFilter);

            if (!query) return render(source, '');

            let results = fuse.search(query).map(r => r.item);
            source.forEach(item => {
                if ((item.fullText || '').toLowerCase().includes(query)) {
                    if (!results.some(r => r.id === item.id)) results.push(item);
                }
            });
            render(results, query);
        }

        function highlight(text, query) {
            if (!query) return text;
            const escaped = query.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
            return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
        }

        function formatParts(text, article, category) {
            return text.replace(/(^|\s|[.,(>])((?:Часть|Ч\.|Ч|ч\.|ч)\s*(\d+))/gi, (match, p1, p2, p3) => {
                const partClipText = `Ч. ${p3} ${article} ${category}`;
                return `${p1}<span onclick="event.stopPropagation(); copyToClipboard('${partClipText}')" class="no-drag bg-[#181824] text-zinc-200 font-bold px-1.5 py-0.5 rounded border border-[#252538] text-[10px] uppercase shadow-sm mx-0.5 cursor-pointer hover:bg-[#ff1e56]/10 hover:border-[#ff1e56] hover:text-[#ff1e56] transition-all" title="Копировать часть">${p2}</span>`;
            });
        }

        function render(items, query) {
            const container = document.getElementById('results');
            if(!items || items.length === 0) {
                container.innerHTML = `<div class="text-zinc-600 text-xs text-center py-12 font-bold tracking-wider uppercase">Ничего не найдено. Выполните парсинг.</div>`;
                return;
            }

            container.innerHTML = items.map(item => {
                const hlTitle = highlight(item.title, query);
                let hlText = highlight(item.fullText || '', query);
                const clipText = currentMainTab === 'laws' ? `${item.article} ${item.category}` : `Пункт ${item.article} правил ${item.category}`;

                hlText = formatParts(hlText, item.article, item.category);
                hlText = hlText.split('\n').join('<div class="h-1.5 w-full"></div>');

                let punishTag = '';
                let parts = [];
                if (item.fine) parts.push(`Штраф ${item.fine}`);
                if (item.jail) parts.push(`Арест ${item.jail}`);
                
                if (parts.length > 0) {
                    punishTag = `<span class="bg-emerald-500/5 text-emerald-400 border border-emerald-500/10 px-2 py-0.5 rounded shadow-sm tracking-wider font-mono">${parts.join(' / ')}</span>`;
                }

                return `
                    <div class="bg-[#121218] border border-[#1f1f2e] p-4 rounded-lg hover:border-[#ff1e56]/40 transition-all flex flex-col gap-3 relative group">
                        <div class="flex justify-between items-center border-b border-[#1b1b26] pb-3">
                            <div onclick="copyToClipboard('${clipText}')" class="no-drag font-black text-sm text-[#ff1e56] cursor-pointer hover:text-white bg-[#ff1e56]/5 hover:bg-[#ff1e56] px-3 py-1.5 rounded border border-[#ff1e56]/20 transition-all shadow-sm">
                                ${hlTitle}
                            </div>
                            <div class="flex gap-1.5 text-[10px] font-black uppercase">${punishTag}</div>
                        </div>
                        <div class="text-[12px] text-zinc-300 font-medium leading-relaxed select-text selection:bg-[#ff1e56]/30">${hlText}</div>
                    </div>
                `;
            }).join('');
        }

        function renderMiniForum() {
            const container = document.getElementById('mf-container');
            let html = `<div class="mf-header">№</div><div class="mf-header">Статья</div><div class="mf-header">Наказание</div>`;
            
            miniForumData.forEach(block => {
                html += `<div class="mf-cell cat-${block.cat} col-span-3 font-bold uppercase tracking-wider text-[11px] py-2">${block.title}</div>`;
                block.items.forEach(item => {
                    html += `
                        <div class="mf-cell font-mono text-[11px] font-bold text-white cursor-pointer hover:bg-[#1f1f2e] transition-colors" onclick="copyToClipboard('${item.id} ${block.cat.toUpperCase()}')">${item.id}</div>
                        <div class="mf-cell mf-cell-left">${item.text}</div>
                        <div class="mf-cell font-bold text-[10px] text-zinc-400">${item.time}</div>
                    `;
                });
            });
            container.innerHTML = html;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'scale-95');
            toast.classList.add('opacity-100', 'scale-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'scale-100');
                toast.classList.add('opacity-0', 'scale-95');
            }, 1200);
        }

        document.getElementById('search').addEventListener('input', search);
        document.getElementById('opacity').addEventListener('input', (e) => window.api.setOpacity(e.target.value));
        window.api.onFocus(() => {
            if (!document.getElementById('view-general').classList.contains('hidden')) {
                document.getElementById('search').focus();
            }
        });

        init();
    </script>
</body>
</html>
